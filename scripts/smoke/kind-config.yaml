---
# Kind cluster config for the df-telemetry kind smoke test (CI-04).
# Adapted from upstream _run/kube/kind-config.yaml — a single control-plane
# node is sufficient: the smoke test deploys one provider-gateway pod with the
# UDS-reader sidecar in the akash-services namespace (DEC-04).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
