name: github

on:
  pull_request:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - synchronize

jobs:
  wip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: akash-network/wip-check@6c3ce258de2b71c3cecdcbd69bacb92166072572 # v1
        with:
          labels: '["do-not-merge", "wip", "rfc"]'
          keywords: '["WIP", "wip", "RFC", "rfc"]'
