# Digital Frontier VAT fork — gated auto-merge of upstream rebase PRs.
#
# A rebase PR (opened by upstream-watch.yaml) merges UNATTENDED only when BOTH:
#   1. the df-telemetry/ tree hash is unchanged between the pre-rebase fork and
#      the rebased branch — the rebase did not touch our hook; AND
#   2. ci.yaml's checks (df-telemetry-tests, kind-smoke) are green.
#
# FORK-06/CI-03 enforcement. git rerere cannot be path-scoped, so the
# df-telemetry/ tree-hash guard is the real protection: a rerere auto-resolution
# (or any rebase change) that touches df-telemetry/ alters that tree hash, the
# guard fires, the PR is labelled needs-human, and the merge is blocked.
#
# Fail-closed: no step swallows its own failure. The default outcome whenever
# anything is uncertain is "do not auto-merge".
name: auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  # tree-hash-guard is a REQUIRED STATUS CHECK on every PR to main. It must run
  # on ALL PRs — not just rebase PRs — so the required check always reports a
  # definite conclusion. A job gated off by a job-level `if:` reports "skipped",
  # and a required check that never returns a result blocks every non-rebase PR
  # from merging. On a non-rebase PR the guard is not applicable and passes
  # trivially; on a rebase PR it enforces the df-telemetry/ tree-hash check.
  # Branch protection blocks the merge when this job fails.
  tree-hash-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history for the tree comparison)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert rerere/guard configuration (CI-03 / FORK-06)
        run: bash scripts/check-rerere-config.sh

      - name: Guard — df-telemetry/ tree hash unchanged by the rebase
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # The guard only applies to the rebase PRs opened by upstream-watch.yaml.
          # Any other PR (a human change, a workflow fix) is an intentional edit
          # that does not need the rebase tree-hash check — pass trivially so the
          # required status check still reports success.
          case "${HEAD_REF}" in
            rebase/*) ;;
            *)
              echo "Not a rebase PR (head ref: '${HEAD_REF:-none}') — df-telemetry/ tree-hash guard not applicable. Pass."
              exit 0
              ;;
          esac
          # Compare the PR base (the fork before the rebase) against the PR head
          # (the rebased branch). A difference means the rebase modified our
          # hook -> label needs-human and fail the required check.
          if bash scripts/df-telemetry-treehash.sh --compare \
               "origin/${BASE_REF}" "${HEAD_SHA}"; then
            echo "Guard passed: df-telemetry/ untouched by this rebase."
          else
            echo "Guard tripped: df-telemetry/ changed — human review required."
            gh pr edit "${PR_NUMBER}" \
              --add-label needs-human \
              --add-label "conflict:our-hook"
            exit 1
          fi

  # auto-merge enables GitHub auto-merge only after the guard passed AND the
  # ci.yaml checks are green. The --auto flag means GitHub completes the squash
  # merge once every required check (tree-hash-guard, df-telemetry-tests,
  # kind-smoke) succeeds.
  auto-merge:
    runs-on: ubuntu-latest
    needs: tree-hash-guard
    if: startsWith(github.event.pull_request.head.ref, 'rebase/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require ci.yaml checks green, then enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Gate on Plan 04's ci.yaml job names. gh pr checks exits non-zero if
          # any check failed or is still pending — fail-closed: an uncertain
          # state never merges.
          CHECKS=$(gh pr checks "${PR}" --json name,state \
            --jq '.[] | select(.name=="df-telemetry-tests" or .name=="kind-smoke")')
          echo "${CHECKS}"
          if echo "${CHECKS}" | grep -q '"state":"FAILURE"'; then
            echo "A required ci.yaml check failed — not merging."
            gh pr edit "${PR}" --add-label needs-human || true
            exit 1
          fi
          # Enable auto-merge: GitHub squash-merges once all required checks pass.
          gh pr merge "${PR}" --auto --squash
          echo "Auto-merge enabled for PR #${PR} (squash, once all required checks pass)."
