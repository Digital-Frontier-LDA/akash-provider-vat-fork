# Digital Frontier VAT fork — tree-hash guard self-test.
#
# Executable proof of FORK-05's deliberate-conflict requirement: the auto-merge
# guard "refuses to auto-merge when the directory hash of df-telemetry/ changes
# — verified by a deliberate-conflict test fixture."
#
# The self-test builds two fixtures (one that touches df-telemetry/, one that
# does not) and asserts the tree-hash guard BLOCKS the former and ALLOWS the
# latter. Running on pull_request means a change to the guard scripts is itself
# guard-tested.
#
# Fail-closed: no step swallows its own failure.
name: rebase-guard-selftest

on:
  # PR-triggered: every PR re-runs this proof-of-correctness (the fixture +
  # guard execution take seconds, no `paths` filter — cheap and exhaustive).
  # protect-main blocks direct pushes to main, so a post-merge `push: [main]`
  # re-run is redundant — and was brittle: `git fetch` auth failed on push
  # events for this workflow. workflow_dispatch remains for ad-hoc verification.
  pull_request: {}
  workflow_dispatch: {}

jobs:
  guard-selftest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — the guard compares trees across refs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure a local main ref
        # On pull_request, actions/checkout leaves a detached HEAD with no local
        # `main` branch. make-fixture.sh branches the fixtures off `main` and
        # the guard comparisons below reference `main`, so it must exist locally.
        # On push-to-main events, `main` is already the checked-out branch —
        # `git branch -f` would refuse to update the worktree branch, so skip
        # the rebranch in that case (it's already at the right ref).
        run: |
          set -euo pipefail
          git fetch origin main
          if [ "$(git rev-parse --abbrev-ref HEAD 2>/dev/null)" != "main" ]; then
            git branch -f main FETCH_HEAD
          else
            echo "Already on main — skipping rebranch (fetch updated origin/main)."
          fi

      - name: Build the deliberate-conflict fixtures
        run: bash scripts/conflict-fixture/make-fixture.sh

      - name: Assert the guard BLOCKS a df-telemetry/-touching rebase
        run: |
          set -euo pipefail
          if bash scripts/df-telemetry-treehash.sh --compare main df-fixture/overlapping; then
            echo "FAIL: the guard did NOT block a df-telemetry/-touching change"
            exit 1
          else
            echo "OK: the guard blocked the df-telemetry/-overlapping fixture"
          fi

      - name: Assert the guard ALLOWS a non-overlapping rebase
        run: |
          set -euo pipefail
          if bash scripts/df-telemetry-treehash.sh --compare main df-fixture/non-overlapping; then
            echo "OK: the guard allowed the non-overlapping fixture"
          else
            echo "FAIL: the guard blocked a clean (non-df-telemetry/) change"
            exit 1
          fi

      - name: Clean up the fixtures
        run: bash scripts/conflict-fixture/clean-fixture.sh

      - name: Summary
        run: |
          echo "PASS: tree-hash guard blocks df-telemetry/ changes and allows clean rebases (FORK-05)"
